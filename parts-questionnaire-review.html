<article class="answer-review">
  <section class="questionnaire-review">
    <p class="answer-main">回答内容に誤りがないか確認してください</p>
    <section class="review-items questionnaire-review-items">
      <div class="review-item questionnaire-review-item">
        <span class="label">現在の学年:</span>
        <span class="value">{select-1}</span>
      </div>
      <div class="review-item questionnaire-review-item">
        <span class="label">小学校受験の予定:</span>
        <span class="value">{select-2}</span>
      </div>
      <section class="questionnaire-school">
        <div class="review-item questionnaire-review-item">
          <span class="label">志望校のタイプ:</span>
          <span class="value">{select-3}</span>
        </div>
        <div class="review-item questionnaire-review-item op-0">
          <span class="label">志望校のタイプ(私立):</span>
          <span class="value">{select-4}</span>
        </div>
        <div class="review-item questionnaire-review-item">
          <span class="label">第一志望校:</span>
          <span class="value">{select-5}</span>
        </div>
        <div class="review-item questionnaire-review-item">
          <span class="label">第二志望校:</span>
          <span class="value">{select-6}</span>
        </div>
        <div class="review-item questionnaire-review-item">
          <span class="label">第三志望校:</span>
          <span class="value">{select-7}</span>
        </div>
      </section>
      <div class="review-item questionnaire-review-item">
        <span class="label">現在の学習状況:</span>
        <span class="value">{checkbox-1}</span>
      </div>
      <div class="review-item questionnaire-review-item">
        <span class="label">お通いのお教室:</span>
        <span class="value">{checkbox-2}</span>
      </div>
      <div class="review-item questionnaire-review-item">
        <span class="label">実力診断テストの満足度:</span>
        <span class="value">{radio-1}</span>
      </div>
      <div class="review-item questionnaire-review-item text-area">
        <span class="label">ご意見・ご要望:</span>
        <span class="value">{textarea-1}</span>
      </div>
    </section>
  </section>

  <!-- .answer-review-footer end-->
</article>
